    </div>

  <div class="search-bar">

</div>

<!-- PRODUTOS -->
<div class="container" id="produtos"></div>

<!-- OVERLAY -->
<div class="overlay" onclick="toggle()"></div>

<!-- CARRINHO -->

    <h2>Seu pedido</h2>
    <button class="fechar" onclick="toggle()">✖</button>
  </div>

  <div class="total" id="total"></div>

    <select id="pagamento">

      <option>Pix</option>

    <button class="whatsapp" onclick="enviar()">Finalizar Pedido</button>

];

/* ================== ESTADO ================== */
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let buscaAtual = "";
let categoriaAtual = "todos";

/* ================== RENDER ================== */
function render(){
  const container = document.getElementById("produtos");

  const filtrados = produtos.filter(p =>
    (categoriaAtual==="todos" || p.categoria===categoriaAtual) &&
    p.nome.toLowerCase().includes(buscaAtual.toLowerCase())
  );

  if(filtrados.length === 0){
    container.innerHTML = "<p>Nenhum produto encontrado</p>";
    return;
  }

  container.innerHTML = filtrados.map(p=>{
    const item = carrinho.find(i=>i.nome===p.nome);

    return `
    <div class="produto">
      <img src="${p.img}">
      <h3>${p.nome}</h3>
      <p>R$ ${p.preco.toFixed(2)}</p>

      <div class="controle-card">
        <button onclick="menosCard('${p.nome}')">-</button>
        <span>${item ? item.qtd : 0}</span>
        <button onclick="add('${p.nome}',${p.preco})">+</button>
      </div>
    </div>
    `;
  }).join("");

  atualizar();
}

/* ================== BUSCA ================== */
function buscar(valor){
  buscaAtual = valor;
  render();
}

/* ================== FILTRO ================== */
function filtrar(cat){
  categoriaAtual = cat;

  /* destaque botão ativo */
  document.querySelectorAll(".categorias button").forEach(b=>b.classList.remove("ativo"));
  event.target.classList.add("ativo");

  render();
}

/* ================== CARRINHO ================== */
function add(nome,preco){
  const item = carrinho.find(i=>i.nome===nome);
  item ? item.qtd++ : carrinho.push({nome,preco,qtd:1});
  salvar(); render();
}

function menosCard(nome){
  const item = carrinho.find(i=>i.nome===nome);
  if(!item) return;

  item.qtd--;
  if(item.qtd<=0){
    carrinho = carrinho.filter(i=>i.nome!==nome);
  }

  salvar(); render();
}

function atualizar(){
  let total=0, qtdTotal=0;

  const itensHTML = carrinho.map((i,index)=>{
    total += i.preco*i.qtd;
    qtdTotal += i.qtd;

    return `
    <div class="item">
      <strong>${i.nome}</strong>
      <div class="controls">
        <button onclick="menos(${index})">-</button>
        <span>${i.qtd}</span>
        <button onclick="mais(${index})">+</button>
      </div>
    </div>
    `;
  }).join("");

  document.getElementById("itens").innerHTML = itensHTML;
  document.getElementById("total").innerText = "Total: R$ " + total.toFixed(2);
  document.getElementById("contador").innerText = qtdTotal;
}

function mais(i){
  carrinho[i].qtd++;
  salvar(); render();
}

function menos(i){
  carrinho[i].qtd--;
  if(carrinho[i].qtd<=0) carrinho.splice(i,1);
  salvar(); render();
}

/* ================== STORAGE ================== */
function salvar(){
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
}

/* ================== UI ================== */
function toggle(){
  document.getElementById("carrinho").classList.toggle("active");
  document.querySelector(".overlay").classList.toggle("active");
}

/* ================== WHATSAPP ================== */
function enviar(){
  const nome = document.getElementById("nome").value;
  const endereco = document.getElementById("endereco").value;
  const pagamento = document.getElementById("pagamento").value;

  if(!nome || !endereco){
    alert("Preencha nome e endereço!");
    return;
  }

  let msg = "Pedido:%0A";

  carrinho.forEach(i=>{
    msg += `- ${i.nome} x${i.qtd}%0A`;
  });

  const total = carrinho.reduce((s,i)=>s+(i.preco*i.qtd),0);

  msg += `%0ATotal: R$${total.toFixed(2)}`;
  msg += `%0A%0ANome: ${nome}`;
  msg += `%0AEndereço: ${endereco}`;
  msg += `%0APagamento: ${pagamento}`;

  window.open(`https://wa.me/${WHATSAPP}?text=${msg}`);
}

/* ================== INIT ================== */
render();
